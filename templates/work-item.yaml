wi_id: __WI_ID__
phase_scope: Implementation

goal: "[为满足 REQ-xxx / ACC-xxx，交付什么可验证行为]"
derived_from: __DERIVED_FROM__

requirement_refs:
  - REQ-001
acceptance_refs:
  - ACC-001
verification_refs:
  - VO-001
test_case_refs:
  - TC-ACC-001-01

scope:
  - "[本 WI 具体做什么]"
out_of_scope:
  - "[本 WI 明确不做什么]"

required_surfaces:
  - "[goal/scope 暗示需要触碰的文件/目录表面，例如 alembic.ini, migrations/**, src/**/db/**]"

# allowed_paths must cover all required_surfaces (checked at implementation-start gate)
allowed_paths:
  - "[替换为本 WI 可修改的最小路径，例如 src/module/**]"
forbidden_paths:
  - versions/**
  - spec.md
  - design.md
  - work-items/**
  - contracts/**
  - deployment.md

dependency_refs: []
dependency_type: none
contract_refs: []

required_verification:
  - "[写明当前 WI 完成前必须执行的 branch-local 验证]"

completion_level: fixture_contract
# 允许值（由浅到深，必须声明当前 WI 的实际完成深度）：
# - fixture_contract: fixture / mock / 空壳接口通过，核心逻辑未实现
# - in_memory_domain: 内存中领域逻辑可运行，未连接外部依赖
# - api_connected: 已连接真实外部依赖，但未持久化
# - db_persistent: 数据已持久化，但未在真实运行时集成
# - integrated_runtime: 在真实运行时环境中集成运行通过
# - owner_verified: 产品/需求方已验证确认

stop_conditions:
  - "目标、边界、验收或测试用例不清楚"
  - "需要修改 forbidden_paths 或超出 allowed_paths"
  - "实现需要改变 spec.md / design.md 的产品或架构口径"
  - "阶段性收口前无法在 testing.md 写清 HANDOFF-* 的未完成项、最高完成等级、阻塞原因和下一步"
reopen_triggers:
  - "验收标准、公共契约、外部交互或安全/环境约束发生变化"
