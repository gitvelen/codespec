# 文件修改范围约束（File Modification Constraints）
# 执行分支修改文件时需要同时满足两个约束：
# 1. 全局约束（allowed_paths / forbidden_paths）：定义哪些文件可以/不可以修改，由 runtime 强制检查
# 2. 分支约束（branch_execution.owned_paths / shared_paths）：定义当前执行分支的修改范围，仅用于人工审查，不由 runtime 强制
# 两个约束必须同时满足（AND 关系）

allowed_paths:
  # 全局约束：执行分支可以修改的文件范围
  - src/**
  - meta.yaml
  - testing.md
forbidden_paths:
  # 全局约束：执行分支禁止修改的文件（只能在 parent feature 分支修改）
  - versions/**
  - spec.md
  - design.md
  - work-items/**
  - contracts/**
  - deployment.md
  # Note: testing.md can be modified in execution branches to record branch-local tests

branch_execution:
  execution_group: null  # 并行执行组名（如 "parallel-impl"），仅用于文档化，不由 runtime 强制；非 null 表示多分支并行模式
  execution_branch: null  # 当前执行分支名（如 "group/sanguoA"），仅用于文档化，不由 runtime 强制
  owned_paths:
    # 当前执行分支独占的文件范围（仅用于人工审查，不由 runtime 强制）
    # 单分支工作流：留空 []
    # 多分支并行（execution_group 非 null）：必须填写（gate 会检查非空）
    # 建议是 allowed_paths 的子集
    # 示例：- "src/auth/**"（当前分支独占 auth 模块）
    []
  shared_paths:
    # 多个执行分支共享修改的文件（仅用于人工审查，需要 shared_file_owner 协调）
    # 建议是 allowed_paths 的子集
    # 示例：- "src/types/**"（多个分支共享 types 模块）
    - "TODO: src/[shared-surface]"
  shared_file_owner: parent-feature  # 共享文件的协调者（通常是 parent-feature 分支）
  merge_order: "TODO: relative merge order"  # 合并顺序（用于解决合并冲突）
  conflict_policy: stop and update design before expanding shared scope  # 冲突策略

