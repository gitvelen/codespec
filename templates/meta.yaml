# codespec 元数据文件
# 记录当前变更的状态和执行上下文

change_id: __CHANGE_ID__  # 变更唯一标识
base_version: __BASE_VERSION__  # 基线版本
created_at: __DATE__  # 创建时间

phase: __PHASE__  # 当前阶段：Requirement | Design | Implementation | Testing | Deployment
status: __STATUS__  # 当前状态：active | blocked | completed
# status 语义：
# - active: 当前阶段正常推进
# - blocked: 当前阶段被阻塞（需要外部输入或依赖）
# - completed: 整个变更已完成（只在 Deployment 阶段后使用）

stable_version: null  # 稳定版本号（complete-change 时设置，用于归档和 reopen 定位）

implementation_base_revision: __IMPLEMENTATION_BASE_REVISION__  # 当前 Implementation 回路的 git 基线；进入 Testing 前按此基线检查累计变更
active_authority_repair: null  # 当前打开的 authority repair 记录 ID；正常状态必须为 null
gate_evidence:
  implementation_entry: null  # start-implementation 写入 fresh design-quality 证据

# 阻塞信息（仅当 status=blocked 时填写）
blocked_reason: null  # 阻塞原因描述
blocked_by: null  # 阻塞依赖

updated_at: __DATE__  # 最后更新时间
updated_by: __UPDATED_BY__  # 最后更新人
